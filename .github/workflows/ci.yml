name: CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build:
    runs-on: ubuntu-latest #operating system ,1st create vitual machine on cloud

    steps:
      - name: Checkout code    #2nd copy code from master branch to virtual machine 
        uses: actions/checkout@v4 #version of function itself 

      - name: Set up JDK 17
        uses: actions/setup-java@v4   #set up java function , install java in virtual machine
      with:

        with:
          distribution: "adopt"
          java-version: "17"

      - name: Build (without tests)
        run: gradle clean assemble

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: build/libs/*.jar

  test:
    runs-on: ubuntu-latest
    needs: build    #need build success first 

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: "adopt"
          java-version: "17"

      - name: Run Unit Tests
        run: gradle test

      - name: Generate code coverage report
        run: gradle jacocoTestReport

      - name: Upload Test Reports
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: build/reports/tests/**

      - name: Upload code coverage report
        uses: actions/upload-artifact@v4
        with:
          name: code-coverage-report
          path: build/reports/jacoco/test/html/**

  deployment:
    runs-on: ubuntu-latest
    needs: [build, test]   #need build and test success first 

    steps:
      - name: Download Build Artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-artifacts
          path: build/libs

      - name: Run Deployment
        run: java -jar build/libs/*.jar
